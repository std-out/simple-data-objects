name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * *"

jobs:
  audit:
    name: Composer Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Security audit
        run: composer audit
